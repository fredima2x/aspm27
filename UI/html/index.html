<!DOCTYPE html>
<html lang="en">

<head>

    <title>aspm</title>
    <link rel="stylesheet" href="/UI/css/contacts-window.css">
    <link rel="stylesheet" href="/UI/css/general.css">
    <style>
        .chat-window {
            background-color: lightblue;
            flex: 1;
            height: 100%;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 10px;
        }

        .chat-area {
            background-color: lightpink;
            width: 100px;
            height: 100px;
        }
    </style>
</head>

<body>
    <div class="contacts-window">

            <input type="search" class="contact-search-bar">
        </div>

                    <img src="/UI/imgs/kreise.pdf" class="contact-picture">
                </div>
                <div class="contact-info">
                    <p class="contact-heading">Kontakt 1</p>
                    <p class="contact-number"> Number: 1234567890</p>

                </div>
            </div>
            <div class="contact">

                </div>

                    <p class="contact-heading">Kontakt 2</p>
                    <p class="contact-number"> Number: 1234567890</p>
                    <p class="contact-name"> Name: Max Mustermann</p>
                </div>
            </div>
            <div class="add-contact-button-cont">
                <button class="add-contact-button">+</button>
            </div>
        </div>
    </div>
    <div class="chat-window">

                <p class="contact-heading">Kontakt 1</p>
                <p class="contact-number"> Number: 1234567890</p>
                <p class="contact-name"> Name: Max Mustermann</p>
            </div>
        </div>
        <div class="chat-area">

        </div>
        <div>

        </div>

    </div>
</body>

</html>
